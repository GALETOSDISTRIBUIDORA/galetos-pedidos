<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galetos — Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --red-dark: #9e0c23;
    --red-light: #f8e8eb;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --white: #ffffff;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--red);
    color: white;
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(200,16,46,0.3);
  }
  .header-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { opacity: 0.7; font-weight: 400; font-size: 13px; display: block; margin-top: 1px; }
  .cart-btn {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: white;
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: rgba(255,255,255,0.25); }
  .cart-count { background: white; color: var(--red); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

  /* SCREENS */
  .screen { display: none; max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .screen.active { display: block; }

  /* CADASTRO */
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 24px; }
  .card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .card p { color: var(--gray-600); font-size: 14px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 15px; color: var(--gray-800);
    outline: none; transition: border 0.2s;
  }
  .field input:focus { border-color: var(--red); }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--red); color: white;
    border: none; border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-primary:disabled { background: var(--gray-400); cursor: not-allowed; }

  /* CATÁLOGO */
  .search-bar {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .search-bar input {
    border: none; outline: none; flex: 1;
    font-family: 'Sora', sans-serif; font-size: 14px; color: var(--gray-800);
    background: transparent;
  }
  .search-bar svg { color: var(--gray-400); flex-shrink: 0; }

  .groups-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: 16px;
    scrollbar-width: none;
  }
  .groups-scroll::-webkit-scrollbar { display: none; }
  .group-chip {
    padding: 7px 14px; border-radius: 50px; font-size: 12px; font-weight: 600;
    white-space: nowrap; cursor: pointer; border: 1.5px solid var(--gray-200);
    background: white; color: var(--gray-600); transition: all 0.15s;
    flex-shrink: 0;
  }
  .group-chip.active { background: var(--red); border-color: var(--red); color: white; }

  .group-section { margin-bottom: 20px; }
  .group-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gray-400);
    padding: 0 4px; margin-bottom: 10px;
  }
  .product-card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; transition: box-shadow 0.15s;
  }
  .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
  .product-meta { font-size: 11px; color: var(--gray-400); font-weight: 500; }
  .qty-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
  .qty-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--gray-200);
    background: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 500; color: var(--gray-600);
    transition: all 0.15s; line-height: 1;
  }
  .qty-btn.add { border-color: var(--red); color: var(--red); }
  .qty-btn:hover { transform: scale(1.1); }
  .qty-num { font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; color: var(--red); }
  .qty-num.zero { color: var(--gray-400); font-weight: 400; }

  /* CARRINHO */
  .cart-empty { text-align: center; padding: 48px 20px; color: var(--gray-400); }
  .cart-empty svg { margin-bottom: 12px; }
  .cart-item {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 600; line-height: 1.4; }
  .cart-item-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .cart-item-qty { font-size: 22px; font-weight: 700; color: var(--red); min-width: 32px; text-align: right; }
  .cart-item-unit { font-size: 11px; color: var(--gray-400); text-align: right; }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--gray-400); padding: 4px; }
  .remove-btn:hover { color: var(--red); }

  .cart-summary {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px;
    margin-top: 16px;
  }
  .cart-summary h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray-600); margin-bottom: 8px; }
  .summary-total { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-top: 8px; padding-top: 12px; border-top: 1.5px solid var(--gray-200); }

  .btn-whats {
    width: 100%; padding: 14px;
    background: #25D366; color: white;
    border: none; border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 16px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s;
  }
  .btn-whats:hover { background: #1ebe5c; }
  .btn-secondary {
    width: 100%; padding: 12px;
    background: transparent; color: var(--red);
    border: 1.5px solid var(--red); border-radius: 10px;
    font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--red-light); }

  .user-greeting { font-size: 13px; color: var(--gray-600); margin-bottom: 16px; }
  .user-greeting strong { color: var(--gray-800); }

  .no-results { text-align: center; padding: 32px; color: var(--gray-400); font-size: 14px; }

  @media (max-width: 480px) {
    .screen { padding: 16px 12px; }
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      🥩 Galetos
      <span>Distribuidora de Alimentos</span>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="goCart()" style="display:none">
      🛒 Carrinho
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- TELA 1: CADASTRO -->
<div class="screen active" id="screenCadastro">
  <div class="card" style="margin-top: 32px;">
    <h2>Faça seu pedido</h2>
    <p>Informe seus dados para continuar.</p>
    <div class="field">
      <label>Seu nome</label>
      <input type="text" id="inputNome" placeholder="Ex: João Silva" />
    </div>
    <div class="field">
      <label>Seu e-mail</label>
      <input type="email" id="inputEmail" placeholder="Ex: joao@restaurante.com.br" />
    </div>
    <button class="btn-primary" id="btnEntrar" onclick="entrar()">Acessar catálogo →</button>
  </div>
</div>

<!-- TELA 2: CATÁLOGO -->
<div class="screen" id="screenCatalogo">
  <p class="user-greeting" id="userGreeting"></p>
  <div class="search-bar">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar produto..." oninput="renderCatalog()" />
  </div>
  <div class="groups-scroll" id="groupsScroll"></div>
  <div id="catalogContent"></div>
</div>

<!-- TELA 3: CARRINHO -->
<div class="screen" id="screenCarrinho">
  <div id="cartContent"></div>
</div>

const GROUPS = [...new Set(PRODUCTS.map(p => p.grupo))].sort();
let cart = {};
let currentGroup = 'TODOS';
let userName = '';
let userEmail = '';

function entrar() {
  const nome = document.getElementById('inputNome').value.trim();
  const email = document.getElementById('inputEmail').value.trim();
  if (!nome || !email) { alert('Preencha nome e e-mail para continuar.'); return; }
  if (!email.includes('@')) { alert('Informe um e-mail válido.'); return; }
  userName = nome;
  userEmail = email;
  document.getElementById('screenCadastro').classList.remove('active');
  document.getElementById('screenCatalogo').classList.add('active');
  document.getElementById('cartBtn').style.display = 'flex';
  document.getElementById('userGreeting').innerHTML = `Olá, <strong>${nome}</strong>! Selecione os produtos e quantidades desejadas.`;
  renderGroups();
  renderCatalog();
}

function renderGroups() {
  const wrap = document.getElementById('groupsScroll');
  wrap.innerHTML = `<button class="group-chip active" onclick="filterGroup('TODOS', this)">Todos</button>`;
  GROUPS.forEach(g => {
    wrap.innerHTML += `<button class="group-chip" onclick="filterGroup('${g}', this)">${g}</button>`;
  });
}

function filterGroup(g, el) {
  currentGroup = g;
  document.querySelectorAll('.group-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCatalog();
}

function renderCatalog() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const wrap = document.getElementById('catalogContent');
  let filtered = PRODUCTS.filter(p => {
    const matchGroup = currentGroup === 'TODOS' || p.grupo === currentGroup;
    const matchSearch = !search || p.descricao.toLowerCase().includes(search) || p.codigo.includes(search);
    return matchGroup && matchSearch;
  });

  if (!filtered.length) {
    wrap.innerHTML = '<div class="no-results">Nenhum produto encontrado.</div>';
    return;
  }

  const byGroup = {};
  filtered.forEach(p => {
    if (!byGroup[p.grupo]) byGroup[p.grupo] = [];
    byGroup[p.grupo].push(p);
  });

  wrap.innerHTML = Object.entries(byGroup).map(([grupo, prods]) => `
    <div class="group-section">
      <div class="group-title">${grupo}</div>
      ${prods.map(p => {
        const qty = cart[p.codigo] || 0;
        return `
        <div class="product-card" id="card-${p.codigo}">
          <div class="product-info">
            <div class="product-name">${p.descricao}</div>
            <div class="product-meta">Cód. ${p.codigo} &bull; ${p.embalagem}</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${p.codigo}',-1)" ${qty===0?'style="opacity:0.3;pointer-events:none"':''}>−</button>
            <span class="qty-num ${qty===0?'zero':''}" id="qty-${p.codigo}">${qty}</span>
            <button class="qty-btn add" onclick="changeQty('${p.codigo}',1)">+</button>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function changeQty(codigo, delta) {
  const cur = cart[codigo] || 0;
  const novo = Math.max(0, cur + delta);
  if (novo === 0) delete cart[codigo]; else cart[codigo] = novo;
  updateCartUI();
  const qtyEl = document.getElementById(`qty-${codigo}`);
  if (qtyEl) {
    qtyEl.textContent = novo;
    qtyEl.className = `qty-num ${novo===0?'zero':''}`;
    const card = document.getElementById(`card-${codigo}`);
    const minusBtn = card ? card.querySelector('.qty-btn:first-child') : null;
    if (minusBtn) {
      if (novo === 0) { minusBtn.style.opacity='0.3'; minusBtn.style.pointerEvents='none'; }
      else { minusBtn.style.opacity='1'; minusBtn.style.pointerEvents='auto'; }
    }
  }
}

function updateCartUI() {
  const count = Object.keys(cart).length;
  document.getElementById('cartCount').textContent = count;
}

function goCart() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screenCarrinho').classList.add('active');
  renderCart();
}

function goCatalog() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screenCatalogo').classList.add('active');
}

function renderCart() {
  const items = Object.entries(cart);
  const wrap = document.getElementById('cartContent');
  if (!items.length) {
    wrap.innerHTML = `
      <div class="cart-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <p style="font-size:15px;font-weight:600;color:#374151;margin-top:8px;">Carrinho vazio</p>
        <p style="font-size:13px;margin-top:4px;">Adicione produtos para continuar.</p>
      </div>
      <button class="btn-secondary" onclick="goCatalog()">← Voltar ao catálogo</button>`;
    return;
  }

  const itemsHtml = items.map(([cod, qty]) => {
    const p = PRODUCTS.find(x => x.codigo === cod);
    if (!p) return '';
    return `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.descricao}</div>
        <div class="cart-item-sub">Cód. ${p.codigo} &bull; ${p.embalagem}</div>
      </div>
      <div>
        <div class="cart-item-qty">${qty}</div>
        <div class="cart-item-unit">${qty > 1 ? 'unid.' : 'unid.'}</div>
      </div>
      <button class="remove-btn" onclick="removeItem('${cod}')" title="Remover">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');

  const totalItens = items.reduce((s,[,q])=>s+q, 0);
  wrap.innerHTML = `
    ${itemsHtml}
    <div class="cart-summary">
      <h3>Resumo do pedido</h3>
      <div class="summary-row"><span>Produtos selecionados</span><span>${items.length} itens</span></div>
      <div class="summary-row summary-total"><span>Total de unidades</span><span>${totalItens} unid.</span></div>
    </div>
    <button class="btn-whats" onclick="enviarWhats()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido via WhatsApp
    </button>
    <button class="btn-secondary" onclick="goCatalog()">← Continuar adicionando</button>`;
}

function removeItem(cod) {
  delete cart[cod];
  updateCartUI();
  renderCart();
}

function enviarWhats() {
  const items = Object.entries(cart);
  if (!items.length) return;

  const byGroup = {};
  items.forEach(([cod, qty]) => {
    const p = PRODUCTS.find(x => x.codigo === cod);
    if (!p) return;
    if (!byGroup[p.grupo]) byGroup[p.grupo] = [];
    byGroup[p.grupo].push({ p, qty });
  });

  const now = new Date();
  const dt = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

  let msg = `🛒 *PEDIDO — GALETOS*\n`;
  msg += `👤 *Cliente:* ${userName}\n`;
  msg += `📧 ${userEmail}\n`;
  msg += `📅 ${dt}\n`;
  msg += `─────────────────────\n`;

  Object.entries(byGroup).forEach(([grupo, itens]) => {
    msg += `\n*${grupo}*\n`;
    itens.forEach(({ p, qty }) => {
      msg += `• ${p.descricao} — *${qty} ${p.embalagem}*\n`;
    });
  });

  const totalItens = items.reduce((s,[,q])=>s+q,0);
  msg += `\n─────────────────────\n`;
  msg += `📦 *Total:* ${items.length} produtos | ${totalItens} unidades`;

  const encoded = encodeURIComponent(msg);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');
}
</script>
</body>
</html>
